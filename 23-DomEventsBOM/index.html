<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Calculator</title>
</head>

<body>
    <div class="container">
        <div class="inputs">
            <input type="number" class="num1" placeholder="num 1">
            <input type="number" class="num2" placeholder="num 2">
        </div>

        <div class="result">
            <input type="text" class="result-input" placeholder="result" readonly>
        </div>

        <div class="buttons">
            <button class="plus">Plus</button>
            <button class="minus">Minus</button>
            <button class="mult">Mult</button>
            <button class="divide">Devide</button>
        </div>
    </div>


    <script src="./assets/js/script.js"></script>
</body>

</html>
